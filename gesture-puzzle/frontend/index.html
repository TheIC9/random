<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Puzzle</title>

  <!--
    MediaPipe Vision Tasks — loaded from CDN so they're available as globals.
    HandLandmarker and FilesetResolver are used in App.tsx.
    The WASM runtime loads the GPU delegate automatically.
  -->
  <script type="module">
    import { HandLandmarker, FilesetResolver }
      from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";
    window.HandLandmarker  = HandLandmarker;
    window.FilesetResolver = FilesetResolver;
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
